apiVersion: apps/v1
kind: Deployment
metadata:
  name: stateset-sequencer
  namespace: sequencer
  labels:
    app.kubernetes.io/name: stateset-sequencer
    app.kubernetes.io/version: "0.2.5"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: stateset-sequencer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stateset-sequencer
        app.kubernetes.io/version: "0.2.5"
    spec:
      serviceAccountName: sequencer-sa
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: sequencer
          # Set this to your built image before applying (or via a kustomize patch/overlay).
          image: "${SEQUENCER_IMAGE}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sequencer-config
            - secretRef:
                name: sequencer-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--structured-logs"
            - "--health-check"
            - "--http-address=0.0.0.0"
            - "--port=5432"
            - "${CLOUD_SQL_INSTANCE_CONNECTION_NAME}"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /liveness
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readiness
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /startup
              port: 9090
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 5
            failureThreshold: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: stateset-sequencer
                topologyKey: kubernetes.io/hostname
