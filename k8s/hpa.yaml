apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stateset-sequencer
  namespace: sequencer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stateset-sequencer
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
