apiVersion: v1
kind: Secret
metadata:
  name: sequencer-secrets
  namespace: sequencer
  labels:
    app.kubernetes.io/name: stateset-sequencer
type: Opaque
stringData:
  # Cloud SQL connection via proxy sidecar (localhost:5432)
  # WARNING: Do NOT commit real secrets. Prefer External Secrets / Vault / Secret Manager.
  DATABASE_URL: "postgres://sequencer:CHANGE_ME@127.0.0.1:5432/sequencer"

  # Admin bootstrap key (used for /metrics and admin endpoints)
  BOOTSTRAP_ADMIN_API_KEY: "CHANGE_ME_GENERATE_SECURE_KEY"

  # Payload encryption-at-rest (32-byte key, hex)
  PAYLOAD_ENCRYPTION_KEY: "CHANGE_ME_GENERATE_32_BYTE_HEX_KEY"

  # Anchoring configuration (only if anchoring is enabled in your environment)
  L2_RPC_URL: "https://your-l2-rpc-endpoint"
  SET_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000000"
  SEQUENCER_PRIVATE_KEY: "CHANGE_ME_USE_SECURE_PRIVATE_KEY"

