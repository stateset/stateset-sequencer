apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stateset-sequencer.fullname" . }}
  labels:
    {{- include "stateset-sequencer.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "stateset-sequencer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "stateset-sequencer.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "stateset-sequencer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ .Values.postgresql.host | default (printf "%s-postgresql" (include "stateset-sequencer.fullname" .)) }} -p 5432 -U {{ .Values.postgresql.auth.username }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          securityContext:
            {{- toYaml .Values.initContainer.securityContext | nindent 12 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "stateset-sequencer.fullname" . }}
                  key: database-url
            {{- if .Values.postgresql.readReplica.host }}
            - name: READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "stateset-sequencer.fullname" . }}
                  key: read-database-url
            {{- end }}
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "{{ .Values.service.port }}"
            - name: GRPC_PORT
              value: "{{ .Values.service.grpcPort }}"
            - name: RUST_LOG
              value: {{ .Values.rust.logLevel | quote }}
            {{- if .Values.features.anchoring.enabled }}
            - name: L2_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "stateset-sequencer.fullname" . }}
                  key: l2-rpc-url
            - name: SET_REGISTRY_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ include "stateset-sequencer.fullname" . }}
                  key: set-registry-address
            - name: SEQUENCER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "stateset-sequencer.fullname" . }}
                  key: sequencer-private-key
            {{- end }}
            {{- if .Values.auth.jwt.enabled }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "stateset-sequencer.fullname" . }}
                  key: jwt-secret
            {{- end }}
            {{- if .Values.payloadEncryption.enabled }}
            - name: PAYLOAD_ENCRYPTION_MODE
              value: {{ .Values.payloadEncryption.mode }}
            - name: PAYLOAD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "stateset-sequencer.fullname" . }}
                  key: payload-encryption-key
            {{- end }}
            {{- if .Values.telemetry.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.telemetry.otlpEndpoint }}
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}